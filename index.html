<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS Frames ENTERPRISE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#eef1f5}
.container{max-width:1200px;margin:auto;padding:10px}
.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.btn{padding:8px 12px;border:none;border-radius:6px;margin:3px;cursor:pointer}
.primary{background:#D85A30;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px;text-align:left}
.badge{color:red;font-weight:bold}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>AS Frames Enterprise Dashboard 🚀</h2>
<input id="search" placeholder="Search" oninput="render()">
<button class="btn primary" onclick="openAdd()">+ Order</button>
<button class="btn" onclick="syncSheet()">Sync</button>
<button class="btn" onclick="backup()">Backup</button>
<input type="file" onchange="restore(event)">
</div>

<div class="card">
<table>
<thead>
<tr><th>Name</th><th>Status</th><th>Balance</th><th>Last Msg</th><th>Actions</th></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<div id="modal" style="display:none;position:fixed;top:20%;left:30%;background:#fff;padding:15px;border-radius:8px">
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<select id="status">
<option>New</option><option>Designing</option><option>Printing</option><option>Ready</option><option>Delivered</option>
</select><br><br>
<input id="amount" placeholder="Amount"><br><br>
<input id="advance" placeholder="Advance"><br><br>
<button onclick="saveOrder()">Save</button>
</div>

<script>
let WEBHOOK="https://script.google.com/macros/s/AKfycbwyjsE5nHjX-eKlfv1cJXPr8ZNvUrKOYwTWPRZPbU-fXt5x3sw-oHEFvut9H_34INF-zA/exec";
let orders=JSON.parse(localStorage.getItem('orders')||'[]');

function openAdd(){modal.style.display='block'}

function saveOrder(){
let o={id:Date.now(),name:name.value,phone:phone.value,status:status.value,
amount:+amount.value,advance:+advance.value,balance:amount.value-advance.value,lastMsg:null};
orders.unshift(o);
syncUpsert(o);
save();
modal.style.display='none';
}

function save(){localStorage.setItem('orders',JSON.stringify(orders));render()}

function render(){
let q=search.value.toLowerCase();
tbody.innerHTML=orders.filter(o=>!q||o.name.toLowerCase().includes(q))
.map((o,i)=>{
let urgent=o.lastMsg && Date.now()-o.lastMsg>86400000;
return `<tr>
<td>${o.name}</td>
<td>${o.status}</td>
<td>${o.balance}</td>
<td>${o.lastMsg?time(o.lastMsg):'Never'} ${urgent?'<span class="badge">⚠</span>':''}</td>
<td>
<button onclick="wa(${i})">WA</button>
<button onclick="invoice(${i})">Inv</button>
<button onclick="pay(${i})">Pay</button>
<button onclick="update(${i})">Update</button>
</td>
</tr>`}).join('');
}

function wa(i){
let o=orders[i];
o.lastMsg=Date.now();
window.open('https://wa.me/'+o.phone+'?text='+encodeURIComponent(`Hi ${o.name}, status ${o.status}, balance ${o.balance}`));
save();
}

function pay(i){
let amt=prompt('Payment');
if(!amt)return;
orders[i].advance+=+amt;
orders[i].balance-=amt;
syncUpsert(orders[i]);
save();
}

function update(i){
syncUpsert(orders[i]);
alert('Updated in sheet');
}

function invoice(i){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let o=orders[i];
doc.text('Invoice',10,10);
doc.text(o.name,10,20);
doc.text('Balance:'+o.balance,10,30);
doc.save('invoice.pdf');
}

function time(ts){let s=Math.floor((Date.now()-ts)/1000);return s<60?s+'s':Math.floor(s/60)+'m'}

// UPSERT SYNC (no duplicates)
function syncUpsert(order){
fetch(WEBHOOK,{
method:'POST',
body:JSON.stringify({action:'upsert',data:order})
});
}

function syncSheet(){
fetch(WEBHOOK).then(r=>r.json()).then(data=>{
orders=data;
save();
});
}

// AUTO SYNC
setInterval(syncSheet,10000);

// AUTO REMINDER (console)
setInterval(()=>{
orders.forEach(o=>{
if(o.status==='Ready' && o.lastMsg && Date.now()-o.lastMsg>86400000){
console.log('Reminder:',o.name);
}
});
},60000);

function backup(){
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([JSON.stringify(orders)]));
a.download='backup.json';
a.click();
}

function restore(e){
let r=new FileReader();
r.onload=()=>{orders=JSON.parse(r.result);save()};
r.readAsText(e.target.files[0]);
}

render();
</script>
</body>
</html>
