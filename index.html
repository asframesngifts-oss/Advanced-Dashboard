<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS Frames – Final Clean Enterprise</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;background:#f7f5f0;margin:0;padding:1rem}
.app{max-width:1200px;margin:auto}
.topbar{display:flex;justify-content:space-between;background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.stat{background:#f0ede6;padding:10px;border-radius:8px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:8px;border-bottom:1px solid #ddd}
.btn{padding:5px 10px;border-radius:6px;border:1px solid #ccc;cursor:pointer}
.primary{background:#D85A30;color:#fff}
.wa{background:#128C7E;color:#fff}
.remind{color:#D85A30;border-color:#D85A30}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
<div><b>AS Frames</b></div>
<div>
<button class="btn" onclick="syncSheet()">Sync</button>
<button class="btn primary" onclick="openAdd()">+ New Order</button>
</div>
</div>

<div class="stats">
<div class="stat">Total: <span id="sTotal">0</span></div>
<div class="stat">Pending: <span id="sPending">0</span></div>
<div class="stat">Collected: ₹<span id="sCollected">0</span></div>
<div class="stat">Balance: ₹<span id="sBalance">0</span></div>
</div>

<input id="search" placeholder="Search..." oninput="render()" style="width:100%;padding:8px;margin-bottom:10px">

<table>
<thead>
<tr>
<th>Name</th><th>Phone</th><th>Status</th><th>Amount</th><th>Advance</th><th>Balance</th><th>Last Msg</th><th>Actions</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
let WEBHOOK="https://script.google.com/macros/s/AKfycbwYuyP1yM9iFoF0PhK9erbq8e1K28XkWQqpOvwvgBlDJIpc8mJxr7ych_mz7CaOzHyILA/exec";
let orders=JSON.parse(localStorage.getItem('orders')||'[]');

function save(){localStorage.setItem('orders',JSON.stringify(orders));render();updateStats();}

function render(){
let q=search.value.toLowerCase();
tbody.innerHTML=orders.filter(o=>!q||o.name.toLowerCase().includes(q))
.map((o,i)=>{
let urgent=o.lastMsg && Date.now()-o.lastMsg>86400000;
return `<tr>
<td>${o.name||''}</td>
<td>${o.phone||''}</td>
<td>${o.status||''}</td>
<td>${o.amount||0}</td>
<td>${o.advance||0}</td>
<td>${o.balance||0}</td>
<td>${o.lastMsg?time(o.lastMsg):'Never'} ${urgent?'⚠️':''}</td>
<td>
<button class="btn" onclick="edit(${i})">Edit</button>
<button class="btn wa" onclick="wa(${i})">WA</button>
<button class="btn remind" onclick="remind(${i})">Remind</button>
</td>
</tr>`}).join('');
}

function updateStats(){
sTotal.textContent=orders.length;
sPending.textContent=orders.filter(o=>o.status!=='Delivered').length;
sCollected.textContent=orders.reduce((a,o)=>a+(o.advance||0),0);
sBalance.textContent=orders.reduce((a,o)=>a+(o.balance||0),0);
}

function wa(i){
let o=orders[i];
o.lastMsg=Date.now();
window.open('https://wa.me/'+o.phone+'?text='+encodeURIComponent(`Hi ${o.name}, status ${o.status}, balance ${o.balance}`));
syncUpsert(o);
save();
}

function remind(i){wa(i)}

function edit(i){
let o=orders[i];
o.advance=prompt('Advance',o.advance)||o.advance;
o.balance=o.amount-o.advance;
syncUpsert(o);
save();
}

function time(ts){let s=Math.floor((Date.now()-ts)/1000);return s<60?s+'s':Math.floor(s/60)+'m'}

function syncSheet(){
fetch(WEBHOOK).then(r=>r.json()).then(data=>{orders=data;save();});
}

function syncUpsert(o){
fetch(WEBHOOK,{method:'POST',body:JSON.stringify({action:'upsert',data:o})});
}

setInterval(syncSheet,15000);

render();updateStats();
</script>
</body>
</html>
